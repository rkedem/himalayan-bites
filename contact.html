<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Himalayan Bites | Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      
      <img src="images/logo.png" alt="Himalayan Bites Logo">
    </div>

    <div class="hamburger" id="hamburger">&#9776;</div>

    <nav>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="page-header">
      <h1>Contact Us</h1>
      <p>We would love to hear from you.</p>
    </section>

    <section class="contact-section">
      <div class="map-box">
        <iframe
          src="https://www.google.com/maps?q=Queens,New%20York&output=embed"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

      <div class="form-box">
        <form>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-container">
      <div>
        <h3>Business Hours</h3>
        <p>Monday - Friday: 11:00 AM - 9:00 PM</p>
        <p>Saturday - Sunday: 12:00 PM - 10:00 PM</p>
      </div>

      <div>
        <h3>Follow Us</h3>
        <p><a href="#">Facebook</a></p>
        <p><a href="#">Instagram</a></p>
        <p><a href="#">TikTok</a></p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
